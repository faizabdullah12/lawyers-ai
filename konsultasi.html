<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Konsultasi AI — Lawyers AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- supabase & config diganti stub agar file bisa berdiri sendiri -->
    <style>
        :root {
            --bg: #0F172A;
            --bg-card: #1E293B;
            --bg-input: #0F172A;
            --border: rgba(255,255,255,0.09);
            --accent: #3B82F6;
            --text-1: #F1F5F9;
            --text-2: #94A3B8;
            --text-3: #64748B;
            --text-4: #475569;
        }
        body.light {
            --bg: #F8FAFC;
            --bg-card: #FFFFFF;
            --bg-input: #F1F5F9;
            --border: rgba(0,0,0,0.08);
            --text-1: #0F172A;
            --text-2: #334155;
            --text-3: #64748B;
            --text-4: #94A3B8;
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body {
            display: flex;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--text-1);
            transition: background .25s, color .25s;
        }

        /* ── MAIN SCROLL ── */
        .main-scroll {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            height: 100%;
        }
        @media (min-width: 1024px) { .main-scroll { overflow: hidden; } }

        /* ── WRAPPER ── */
        .konsultasi-wrap {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 54px 12px 16px;
            gap: 10px;
        }
        @media (min-width: 480px)  { .konsultasi-wrap { padding: 58px 16px 20px; gap: 12px; } }
        @media (min-width: 1024px) {
            .konsultasi-wrap {
                flex-direction: row;
                padding: 36px 24px 0;
                gap: 20px;
                overflow: hidden;
                min-height: 0;
                flex: 1;
            }
        }

        /* ── CHAT COLUMN ── */
        .chat-col { display: flex; flex-direction: column; }
        @media (min-width: 1024px) {
            .chat-col { flex: 1; min-height: 0; overflow: hidden; padding-bottom: 10px; }
        }

        /* ── CHAT WINDOW ── */
        .chat-window {
            overflow-y: auto;
            overflow-x: hidden;
            padding: 4px 4px 8px 2px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            max-height: 40vh;
            min-height: 120px;
        }
        @media (min-width: 480px)  { .chat-window { max-height: 44vh; min-height: 150px; } }
        @media (min-width: 768px)  { .chat-window { max-height: 50vh; } }
        @media (min-width: 1024px) { .chat-window { flex: 1; min-height: 0; max-height: none; } }
        .chat-window::-webkit-scrollbar { width: 4px; }
        .chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* ── CHAT HEADER ── */
        .chat-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-top: 2px;
            flex-shrink: 0;
        }
        @media (min-width: 480px) { .chat-header { margin-bottom: 14px; padding-top: 4px; } }
        .chat-header-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            margin-top: 4px;
        }
        @media (min-width: 480px) { .chat-header-actions { gap: 8px; } }

        /* ── THEME TOGGLE ── */
        .theme-toggle {
            width: 46px; height: 26px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            position: relative;
            padding: 0;
            transition: background .2s;
        }
        .theme-toggle .knob {
            position: absolute;
            top: 3px; left: 3px;
            width: 20px; height: 20px;
            border-radius: 50%;
            background: var(--bg-card);
            font-size: 11px;
            display: flex; align-items: center; justify-content: center;
            transition: transform .2s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
        body.light .theme-toggle .knob { transform: translateX(20px); }

        /* ── INPUT BAR ── */
        .input-bar-wrap { flex-shrink: 0; padding: 8px 0 2px; background: var(--bg); }
        @media (min-width: 480px) { .input-bar-wrap { padding: 10px 0 4px; } }
        .input-bar {
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 7px 7px 7px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: border-color .2s, box-shadow .2s;
            min-height: 46px;
        }
        @media (min-width: 480px) { .input-bar { padding: 8px 8px 8px 16px; min-height: 50px; } }
        .input-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
        body.light .input-bar { background: #FFFFFF; }
        .input-bar input {
            flex: 1; min-width: 0;
            background: transparent;
            border: none; outline: none;
            font-weight: 600;
            color: var(--text-1);
            font-family: inherit;
            font-size: max(16px, 13px);
        }
        @media (min-width: 480px) { .input-bar input { font-size: 13px; } }
        .input-bar input::placeholder { color: var(--text-4); }
        .btn-send {
            flex-shrink: 0;
            display: flex; align-items: center; gap: 5px;
            padding: 9px 13px;
            font-size: 10px;
            border-radius: 14px;
            white-space: nowrap;
        }
        @media (min-width: 480px) { .btn-send { gap: 6px; padding: 10px 16px; } }

        /* ── BTN PRIMARY ── */
        .btn-primary {
            background: linear-gradient(135deg,#2563EB,#3B82F6);
            color: #fff;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .1em;
            display: inline-flex; align-items: center; gap: 6px;
            transition: opacity .15s, transform .1s;
        }
        .btn-primary:hover { opacity: .9; }
        .btn-primary:active { transform: scale(.97); }
        .btn-primary:disabled { opacity: .4; cursor: not-allowed; }

        /* ── BUBBLES ── */
        .message-ai {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px 20px 20px 6px;
            padding: 14px;
            margin-bottom: 10px;
            line-height: 1.65;
            word-break: break-word;
            overflow-wrap: anywhere;
        }
        @media (min-width: 480px) { .message-ai { padding: 18px; margin-bottom: 12px; } }
        body.light .message-ai { background: #FFFFFF; box-shadow: 0 2px 12px rgba(0,0,0,.06); }

        .message-user {
            background: linear-gradient(135deg,#2563EB,#3B82F6);
            color: white;
            border-radius: 20px 20px 6px 20px;
            padding: 12px 15px;
            margin-bottom: 10px;
            margin-left: auto;
            line-height: 1.65;
            max-width: 85%;
            box-shadow: 0 6px 20px rgba(37,99,235,.3);
            word-break: break-word;
            overflow-wrap: anywhere;
        }
        @media (min-width: 480px) { .message-user { padding: 14px 18px; margin-bottom: 12px; max-width: 82%; } }

        /* ── Narrative text ── */
        .ai-narrative {
            font-size: 13px;
            color: var(--text-2);
            line-height: 1.75;
            margin: 0;
        }
        .ai-narrative strong { color: var(--text-1); font-weight: 700; }
        .ai-narrative em { font-style: italic; color: var(--text-2); }
        .ai-narrative br + br { display: block; margin-top: 4px; }

        /* ── RIGHT PANEL ── */
        .right-col {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            padding-bottom: calc(env(safe-area-inset-bottom,0px) + 16px);
        }
        @media (min-width: 480px)  { .right-col { gap: 10px; } }
        @media (min-width: 1024px) {
            .right-col { width: 320px; flex-shrink: 0; overflow-y: auto; min-height: 0; padding: 0 0 24px; gap: 12px; }
        }

        .panel-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px;
        }
        @media (min-width: 480px) { .panel-box { border-radius: 20px; padding: 18px; } }
        body.light .panel-box { background: #FFFFFF; box-shadow: 0 2px 12px rgba(0,0,0,.06); }

        .panel-box-dark {
            background: #0F172A;
            border: 1px solid rgba(255,255,255,.07);
            border-radius: 16px;
            padding: 14px;
        }
        @media (min-width: 480px) { .panel-box-dark { border-radius: 20px; padding: 18px; } }

        #pasal-box {
            max-height: 180px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,.1) transparent;
        }
        @media (min-width: 480px) { #pasal-box { max-height: 220px; } }

        .ai-label { font-size: 9px; font-weight: 800; color: var(--text-3); text-transform: uppercase; letter-spacing: .12em; }
        .ai-title { font-size: 14px; font-weight: 900; font-style: italic; color: var(--text-1); }

        /* Header scaling */
        .chat-header h2 { font-size: 18px !important; }
        @media (min-width: 480px) { .chat-header h2 { font-size: 22px !important; } }
        #header-avatar { width: 34px !important; height: 34px !important; }
        @media (min-width: 480px) { #header-avatar { width: 40px !important; height: 40px !important; } }

        /* Loading dots */
        .loading-dots::after { content: ' .'; animation: dots 1.5s steps(5,end) infinite; }
        @keyframes dots {
            0%,20%  { color: rgba(0,0,0,0); }
            40%     { color: white; }
            60%     { text-shadow: .25em 0 0 white; }
            80%,100%{ text-shadow: .25em 0 0 white, .5em 0 0 white; }
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .fade-up { animation: fadeUp .4s ease both; }
    </style>
</head>
<body>

<div class="main-scroll">
    <div class="konsultasi-wrap">

        <!-- ══ KIRI: CHAT ══ -->
        <div class="chat-col">

            <header class="chat-header fade-up">
                <div>
                    <p style="font-size:10px;font-weight:700;color:var(--text-4);text-transform:uppercase;letter-spacing:.14em;margin-bottom:3px;">Konsultasi</p>
                    <h2 style="font-weight:900;color:var(--text-1);margin:0;font-style:italic;">
                        Legal AI <span style="color:#60A5FA;">Workspace</span>
                    </h2>
                    <div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
                        <span style="width:7px;height:7px;background:#10B981;border-radius:50%;display:inline-block;animation:pulse 2s infinite;"></span>
                        <span style="font-size:9px;font-weight:800;color:#10B981;text-transform:uppercase;letter-spacing:.12em;">AI Online</span>
                    </div>
                </div>
                <div class="chat-header-actions">
                    <button onclick="clearHistory()" title="Hapus riwayat chat"
                        style="width:32px;height:32px;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;cursor:pointer;color:var(--text-3);font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .2s;"
                        onmouseover="this.style.borderColor='#F87171';this.style.color='#F87171'"
                        onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-3)'">
                        <i class="fas fa-trash-can"></i>
                    </button>
                    <button class="theme-toggle" onclick="toggleTheme()"><div class="knob">🌙</div></button>
                    <img id="header-avatar"
                        src="https://ui-avatars.com/api/?name=U&background=1E3A5F&color=60A5FA"
                        style="border-radius:10px;object-fit:cover;border:2px solid var(--border);cursor:pointer;"
                        alt="Avatar">
                </div>
            </header>

            <div class="chat-window" id="chat-box"></div>

            <div class="input-bar-wrap">
                <div class="input-bar">
                    <i class="fas fa-pen-to-square" style="color:var(--text-4);font-size:13px;flex-shrink:0;"></i>
                    <input type="text" id="user-input"
                        placeholder="Tulis kronologi kasus di sini..."
                        onkeydown="if(event.key==='Enter')sendMessage()">
                    <button type="button" onclick="sendMessage()" id="btn-analisis"
                        class="btn-primary btn-send">
                        <span id="btn-text">Analisis</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>

        </div><!-- /chat-col -->

        <!-- ══ KANAN: PANEL ══ -->
        <div class="right-col fade-up" style="animation-delay:.1s;">

            <div class="panel-box">
                <p style="font-size:9px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border);">⚖️ Analisis Dasar Hukum</p>
                <div id="pasal-box">
                    <div style="padding:14px;background:rgba(59,130,246,.05);border:1px dashed rgba(59,130,246,.2);border-radius:14px;">
                        <p style="font-size:9px;font-weight:800;color:#60A5FA;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;">Status: Menunggu</p>
                        <p style="font-size:11px;color:var(--text-3);font-style:italic;line-height:1.6;">Analisis pasal hukum akan muncul di sini setelah Anda mengirim kasus.</p>
                    </div>
                </div>
            </div>

            <div class="panel-box-dark">
                <p style="font-size:9px;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px;">📄 Draf Somasi</p>
                <p style="font-size:11px;color:#64748B;margin-bottom:14px;line-height:1.6;">Unduh draf somasi resmi hasil analisis AI.</p>
                <button id="btn-pdf" onclick="generatePDF()" disabled
                    style="width:100%;padding:13px;background:#1E293B;border:1px solid rgba(255,255,255,.06);border-radius:14px;font-size:10px;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:.12em;cursor:not-allowed;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;font-family:inherit;">
                    <i class="fas fa-lock"></i> Locked
                </button>
            </div>

        </div><!-- /right-col -->

    </div>
</div><!-- /main-scroll -->

<script>
/* ─────────────────────────────────────────────
   CONFIG
───────────────────────────────────────────── */
const MODEL_CHAIN = [
    'deepseek/deepseek-r1:free',
    'deepseek/deepseek-chat-v3-0324:free',
    'meta-llama/llama-3.3-70b-instruct:free',
    'qwen/qwen-2.5-72b-instruct:free',
    'mistralai/mistral-7b-instruct:free',
];

const HISTORY_KEY  = 'lawyers_ai_chat_history';
const ANALYSIS_KEY = 'lawyers_ai_last_analysis';
let chatHistory    = [];
let currentAnalysis = null;

/* ─────────────────────────────────────────────
   THEME
───────────────────────────────────────────── */
function toggleTheme() {
    document.body.classList.toggle('light');
    const knob = document.querySelector('.theme-toggle .knob');
    if (knob) knob.textContent = document.body.classList.contains('light') ? '☀️' : '🌙';
    localStorage.setItem('lai_theme', document.body.classList.contains('light') ? 'light' : 'dark');
}
(function(){
    if (localStorage.getItem('lai_theme') === 'light') {
        document.body.classList.add('light');
        const knob = document.querySelector('.theme-toggle .knob');
        if (knob) knob.textContent = '☀️';
    }
})();

/* ─────────────────────────────────────────────
   WELCOME BUBBLE
───────────────────────────────────────────── */
const WELCOME_HTML = `<div class="message-ai" id="welcome-bubble">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <div style="width:32px;height:32px;background:rgba(59,130,246,.12);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <i class="fas fa-robot" style="color:#60A5FA;font-size:13px;"></i>
        </div>
        <div>
            <p class="ai-title">Lawyers AI Assistant</p>
            <p class="ai-label" style="margin-top:2px;">Powered by AI — Selalu siap 24/7</p>
        </div>
    </div>
    <p class="ai-narrative">Hei! Ceritain aja kasusnya ke saya — semakin detail kronologinya, semakin tajam analisisnya. Mau mulai dari mana?</p>
</div>`;

/* ─────────────────────────────────────────────
   HISTORY
───────────────────────────────────────────── */
function saveHistory() {
    try {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(chatHistory.slice(-80)));
        if (currentAnalysis) localStorage.setItem(ANALYSIS_KEY, JSON.stringify(currentAnalysis));
    } catch(e) { console.warn('Save history failed:', e); }
}

function loadHistory() {
    const chatBox = document.getElementById('chat-box');
    chatBox.innerHTML = WELCOME_HTML;
    try {
        const rawAnalysis = localStorage.getItem(ANALYSIS_KEY);
        if (rawAnalysis) { currentAnalysis = JSON.parse(rawAnalysis); restorePasalBox(); }

        const raw = localStorage.getItem(HISTORY_KEY);
        if (!raw) return;
        chatHistory = JSON.parse(raw) || [];
        if (!chatHistory.length) return;

        chatHistory.forEach(item => {
            const tmp = document.createElement('div');
            tmp.innerHTML = item.html;
            if (tmp.firstElementChild) chatBox.appendChild(tmp.firstElementChild);
        });

        const badge = document.createElement('div');
        badge.style.cssText = 'text-align:center;padding:6px 0 10px;';
        badge.innerHTML = `<span style="font-size:9px;font-weight:700;color:var(--text-4);background:var(--bg-input);border:1px solid var(--border);padding:4px 14px;border-radius:20px;text-transform:uppercase;letter-spacing:.1em;">
            📂 ${chatHistory.length} pesan tersimpan &nbsp;·&nbsp;
            <button onclick="clearHistory()" style="background:none;border:none;color:#F87171;font-size:9px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:.08em;padding:0;font-family:inherit;">Hapus Semua</button>
        </span>`;
        const welcome = document.getElementById('welcome-bubble');
        if (welcome) welcome.after(badge); else chatBox.prepend(badge);
        chatBox.scrollTop = chatBox.scrollHeight;
    } catch(e) { console.warn('Load history failed:', e); chatHistory = []; }
}

function restorePasalBox() {
    if (!currentAnalysis) return;
    const pb = document.getElementById('pasal-box');
    if (pb) pb.innerHTML = buildPasalHTML(currentAnalysis);
    unlockPdfBtn();
}

function buildPasalHTML(a) {
    return `<div style="padding:14px;background:linear-gradient(135deg,#2563EB,#1d4ed8);border-radius:14px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <i class="fas fa-gavel" style="color:rgba(255,255,255,.8);font-size:11px;flex-shrink:0;"></i>
            <p style="font-size:9px;font-weight:800;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:.1em;margin:0;word-break:break-word;">${escapeHtml(a.pasal||'')}</p>
        </div>
        <p style="font-size:12px;color:#fff;font-style:italic;line-height:1.65;margin-bottom:10px;word-break:break-word;">"${escapeHtml(a.isi_pasal||'')}"</p>
        <div style="padding-top:10px;border-top:1px solid rgba(255,255,255,.2);">
            <p style="font-size:9px;color:rgba(255,255,255,.6);text-transform:uppercase;font-weight:800;letter-spacing:.1em;margin-bottom:4px;">Kategori</p>
            <p style="font-size:12px;color:#fff;font-weight:700;margin:0;">${escapeHtml(a.kategori||'Hukum Umum')}</p>
        </div>
    </div>`;
}

function unlockPdfBtn() {
    const btn = document.getElementById('btn-pdf');
    if (!btn) return;
    btn.disabled = false;
    btn.style.cssText = 'width:100%;padding:13px;background:#2563EB;border:none;border-radius:14px;font-size:10px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.12em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;font-family:inherit;';
    btn.innerHTML = '<i class="fas fa-file-pdf"></i> Download Somasi';
}

function lockPdfBtn() {
    const btn = document.getElementById('btn-pdf');
    if (!btn) return;
    btn.disabled = true;
    btn.style.cssText = 'width:100%;padding:13px;background:#1E293B;border:1px solid rgba(255,255,255,.06);border-radius:14px;font-size:10px;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:.12em;cursor:not-allowed;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;font-family:inherit;';
    btn.innerHTML = '<i class="fas fa-lock"></i> Locked';
}

/* ─────────────────────────────────────────────
   CLEAR HISTORY
───────────────────────────────────────────── */
async function clearHistory() {
    if (!confirm('Hapus semua riwayat chat?')) return;
    localStorage.removeItem(HISTORY_KEY);
    localStorage.removeItem(ANALYSIS_KEY);
    chatHistory = [];
    currentAnalysis = null;
    document.getElementById('chat-box').innerHTML = WELCOME_HTML;
    document.getElementById('pasal-box').innerHTML = `
        <div style="padding:14px;background:rgba(59,130,246,.05);border:1px dashed rgba(59,130,246,.2);border-radius:14px;">
            <p style="font-size:9px;font-weight:800;color:#60A5FA;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;">Status: Menunggu</p>
            <p style="font-size:11px;color:var(--text-3);font-style:italic;line-height:1.6;">Analisis pasal hukum akan muncul di sini setelah Anda mengirim kasus.</p>
        </div>`;
    lockPdfBtn();
}

/* ─────────────────────────────────────────────
   APPEND
───────────────────────────────────────────── */
function appendToChat(html, role) {
    const chatBox = document.getElementById('chat-box');
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    const el = tmp.firstElementChild || tmp;
    chatBox.appendChild(el);
    chatBox.scrollTop = chatBox.scrollHeight;

}

/* ─────────────────────────────────────────────
   RENDER NARRATIVE  (safe: escape first, then style)
───────────────────────────────────────────── */
function renderNarrative(raw) {
    // 1. escape HTML entities
    const escaped = escapeHtml(raw);
    // 2. apply lightweight markdown
    return escaped
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g,     '<em>$1</em>')
        .replace(/\n{2,}/g,        '</p><p class="ai-narrative" style="margin-top:8px;">')
        .replace(/\n/g,            '<br>');
}

/* ─────────────────────────────────────────────
   FETCH WITH FALLBACK
───────────────────────────────────────────── */
async function fetchWithFallback(messages) {
    let lastError = null;
    for (const model of MODEL_CHAIN) {
        try {
            console.log(`🤖 Mencoba: ${model}`);
            const res = await fetch('/api/ai-proxy', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model, messages, temperature: 0.85, max_tokens: 3000 })
            });
            if ([429, 503, 404].includes(res.status)) {
                lastError = new Error(`${model} tidak tersedia (${res.status})`);
                continue;
            }
            if (!res.ok) {
                const txt = await res.text();
                throw new Error(`API Error ${res.status}: ${txt.substring(0,120)}`);
            }
            const data = await res.json();
            console.log(`✅ Berhasil: ${model}`);
            return data;
        } catch(e) {
            lastError = e;
            const retry = /429|503|404|rate|penuh|tersedia/.test(e.message);
            if (retry) continue;
            throw e;
        }
    }
    throw new Error(`Semua model AI sedang overload. Coba lagi sebentar.\n(${lastError?.message||'Rate limit'})`);
}

async function sendMessage() {
    const input   = document.getElementById('user-input');
    const msg     = input.value.trim();
    if (!msg || msg.length < 3) {
        alert('Pesan terlalu pendek. Ceritakan kasusnya lebih detail ya.');
        return;
    }

    const chatBox = document.getElementById('chat-box');
    const btn     = document.getElementById('btn-analisis');
    const btnText = document.getElementById('btn-text');

    btn.disabled = true;
    input.disabled = true;
    btnText.className = 'loading-dots';
    btnText.textContent = 'Menganalisis';

    const userHtml = `<div class="message-user"><p style="font-size:13px;margin:0;">${escapeHtml(msg)}</p></div>`;
    appendToChat(userHtml, 'user');
    input.value = '';

    // Build messages array (include recent history for context)
    const contextMessages = [
        { role: 'user', content: SYSTEM_PROMPT },
        { role: 'assistant', content: 'Siap! Saya Lawyers AI. Ceritain aja kasusnya.' },
    ];
    // Append last 6 turns for context
    const recentHistory = chatHistory.slice(-7, -1); // exclude the one we just added
    recentHistory.forEach(item => {
        if (item.role === 'user') {
            // Extract plain text from user bubble
            const tmp = document.createElement('div');
            tmp.innerHTML = item.html;
            contextMessages.push({ role: 'user', content: tmp.textContent.trim() });
        } else if (item.role === 'ai') {
            // Extract plain text from AI bubble
            const tmp = document.createElement('div');
            tmp.innerHTML = item.html;
            contextMessages.push({ role: 'assistant', content: tmp.textContent.trim() });
        }
    });
    contextMessages.push({ role: 'user', content: msg });

    try {
        const data = await fetchWithFallback(contextMessages);
        const raw  = (data.choices[0].message.content || '').trim();

        // ── Parse: pisahkan narasi dari JSON blok ──
        const markerStart = raw.indexOf('|||JSON|||');
        const markerEnd   = raw.indexOf('|||END|||');

        if (markerStart !== -1 && markerEnd !== -1 && markerEnd > markerStart) {
            // ── MODE LEGAL ──
            const narrative = raw.substring(0, markerStart).trim();
            const jsonStr   = raw.substring(markerStart + 10, markerEnd).trim();

            let parsed = null;
            try { parsed = JSON.parse(jsonStr); } catch(e) {
                console.warn('JSON parse failed:', e, jsonStr);
            }

            // Render narasi
            const narrativeHtml = `<div class="message-ai">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
                    <div style="width:28px;height:28px;background:rgba(59,130,246,.12);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">

                    </div>
                    <p style="font-size:11px;font-weight:900;color:var(--text-1);font-style:italic;margin:0;">Analisis Hukum</p>
                </div>
                <p class="ai-narrative">${renderNarrative(narrative)}</p>
            </div>`;
            appendToChat(narrativeHtml, 'ai');

            // Update panel kanan jika JSON valid
            if (parsed && parsed.pasal) {
                currentAnalysis = parsed;
                saveHistory();
                document.getElementById('pasal-box').innerHTML = buildPasalHTML(parsed);
                unlockPdfBtn();
                showAdvocateRecommendation();
            }

        } else {
            // ── MODE CHAT (non-hukum atau tidak ada JSON) ──
            const chatHtml = `<div class="message-ai">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                    <div style="width:28px;height:28px;background:rgba(59,130,246,.12);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                        <i class="fas fa-robot" style="color:#60A5FA;font-size:11px;"></i>

                </div>
                <p class="ai-narrative">${renderNarrative(raw)}</p>
            </div>`;
            appendToChat(chatHtml, 'ai');
        }

    } catch(err) {
        console.error('❌', err);
        const is429 = /429|overload|rate|penuh/.test(err.message);
        appendToChat(`
            <div class="message-ai" style="border-color:rgba(239,68,68,.3);">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                    <div style="width:28px;height:28px;background:rgba(239,68,68,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                        <i class="fas fa-exclamation-triangle" style="color:#F87171;font-size:11px;"></i>
                    </div>
                    <p style="font-size:11px;font-weight:900;color:#F87171;font-style:italic;margin:0;">${is429?'AI Sedang Sibuk':'Terjadi Kesalahan'}</p>
                </div>
                ${is429 ? `
                <p style="font-size:13px;color:var(--text-1);font-weight:700;margin-bottom:8px;">Server AI sedang kelebihan permintaan 🔄</p>
                <p style="font-size:12px;color:var(--text-2);line-height:1.65;margin-bottom:10px;">Semua model gratis sedang ramai. Tunggu 1–2 menit lalu coba lagi.</p>

        input.disabled = false;
        btnText.className = '';
        btnText.textContent = 'Analisis';
        chatBox.scrollTop = chatBox.scrollHeight;
