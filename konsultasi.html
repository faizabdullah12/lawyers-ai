<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konsultasi AI — Lawyers AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="shared.css">
    <script src="shared-sidebar.js" defer></script>
    <script src="shared-modal.js"></script>

    <style>
        body { display: flex; min-height: 100vh; }
        .main-scroll { flex: 1; overflow-y: auto; min-width: 0; }

        .konsultasi-wrap {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            padding: 72px 20px 0;
        }
        @media(min-width:1024px) {
            .konsultasi-wrap { padding-top: 36px; flex-direction: row; gap: 20px; }
        }

        /* ── CHAT COLUMN ── */
        .chat-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
            padding-bottom: 16px;
        }

        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .chat-window::-webkit-scrollbar { width: 5px; }
        .chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* ── BUBBLES ── */
        .message-ai {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px 24px 24px 6px;
            padding: 22px;
            margin-bottom: 14px;
            line-height: 1.65;
        }
        body.light .message-ai {
            background: #FFFFFF;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .message-user {
            background: var(--accent);
            color: white;
            border-radius: 24px 24px 6px 24px;
            padding: 16px 20px;
            margin-bottom: 14px;
            margin-left: auto;
            line-height: 1.65;
            max-width: 78%;
            box-shadow: 0 8px 24px rgba(59,130,246,0.25);
        }

        /* ── INPUT BAR ── */
        .input-bar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 10px 10px 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 12px 0 0;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-bar:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        body.light .input-bar { background: #FFFFFF; }

        .input-bar input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-1);
            font-family: inherit;
        }
        .input-bar input::placeholder { color: var(--text-4); }

        /* ── RIGHT PANEL ── */
        .right-col {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-bottom: 20px;
        }
        @media(min-width:1024px) {
            .right-col { width: 320px; flex-shrink: 0; overflow-y: auto; }
        }

        .panel-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 22px;
        }
        body.light .panel-box {
            background: #FFFFFF;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .panel-box-dark {
            background: #0F172A;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 24px;
            padding: 22px;
        }

        .ai-label { font-size: 9px; font-weight: 800; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.12em; }
        .ai-title { font-size: 14px; font-weight: 900; font-style: italic; color: var(--text-1); }
        .ai-body  { font-size: 13px; color: var(--text-2); line-height: 1.7; }

        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5,end) infinite; }
        @keyframes dots { 0%,20%{color:rgba(0,0,0,0)} 40%{color:white} 60%{text-shadow:.25em 0 0 white} 80%,100%{text-shadow:.25em 0 0 white,.5em 0 0 white} }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    </style>
</head>
<body>

    <div class="main-scroll">
        <div class="konsultasi-wrap">

            <!-- ── LEFT: CHAT COLUMN ── -->
            <div class="chat-col">

                <!-- Header -->
                <header style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;padding-top:4px;flex-shrink:0;" class="fade-up">
                    <div>
                        <p style="font-size:10px;font-weight:700;color:var(--text-4);text-transform:uppercase;letter-spacing:0.14em;margin-bottom:4px;">Konsultasi</p>
                        <h2 style="font-size:26px;font-weight:900;color:var(--text-1);margin:0;font-style:italic;">Legal AI <span style="color:#60A5FA;">Workspace</span></h2>
                        <div style="display:flex;align-items:center;gap:6px;margin-top:6px;">
                            <span style="width:7px;height:7px;background:#10B981;border-radius:50%;display:inline-block;animation:pulse 2s infinite;"></span>
                            <span style="font-size:9px;font-weight:800;color:#10B981;text-transform:uppercase;letter-spacing:0.12em;">AI Online</span>
                        </div>
                    </div>
                    <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;margin-top:4px;">
                        <button onclick="clearHistory()" title="Hapus riwayat chat"
                            style="width:34px;height:34px;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;cursor:pointer;color:var(--text-3);font-size:11px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;"
                            onmouseover="this.style.borderColor='#F87171';this.style.color='#F87171'"
                            onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-3)'">
                            <i class="fas fa-trash-can"></i>
                        </button>
                        <button onclick="window.toggleTheme?.()" class="theme-toggle"><div class="knob">🌙</div></button>
                        <img id="header-avatar"
                            src="https://ui-avatars.com/api/?name=U&background=1E3A5F&color=60A5FA"
                            style="width:40px;height:40px;border-radius:12px;object-fit:cover;border:2px solid var(--border);cursor:pointer;"
                            onclick="location.href='profile.html'" alt="Avatar">
                    </div>
                </header>

                <!-- Chat Window -->
                <div class="chat-window" id="chat-box">
                    <!-- history diload oleh loadHistory() -->
                </div>

                <!-- Input Bar -->
                <div class="input-bar" style="flex-shrink:0;">
                    <i class="fas fa-pen-to-square" style="color:var(--text-4);font-size:13px;flex-shrink:0;"></i>
                    <input type="text" id="user-input"
                        placeholder="Tulis kronologi kasus di sini..."
                        onkeydown="if(event.key==='Enter') sendMessage()">
                    <button type="button" onclick="sendMessage()" id="btn-analisis"
                        class="btn-primary" style="flex-shrink:0;padding:10px 18px;font-size:10px;">
                        <span id="btn-text">Analisis</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>

            </div><!-- /chat-col -->

            <!-- ── RIGHT PANEL ── -->
            <div class="right-col fade-up" style="animation-delay:0.1s;">

                <div class="panel-box">
                    <p style="font-size:9px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);">⚖️ Analisis Dasar Hukum</p>
                    <div id="pasal-box">
                        <div style="padding:16px;background:rgba(59,130,246,0.05);border:1px dashed rgba(59,130,246,0.2);border-radius:16px;">
                            <p style="font-size:9px;font-weight:800;color:#60A5FA;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;">Status: Menunggu</p>
                            <p style="font-size:11px;color:var(--text-3);font-style:italic;line-height:1.6;">Analisis pasal hukum akan muncul di sini setelah Anda mengirim kasus.</p>
                        </div>
                    </div>
                </div>

                <div class="panel-box-dark">
                    <p style="font-size:9px;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;">📄 Draf Somasi</p>
                    <p style="font-size:11px;color:#64748B;margin-bottom:16px;line-height:1.6;">Unduh draf somasi resmi hasil analisis AI.</p>
                    <button id="btn-pdf" onclick="generatePDF()" disabled
                        style="width:100%;padding:14px;background:#1E293B;border:1px solid rgba(255,255,255,0.06);border-radius:16px;font-size:10px;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:0.12em;cursor:not-allowed;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;font-family:inherit;">
                        <i class="fas fa-lock"></i> Locked
                    </button>
                </div>

            </div><!-- /right-col -->

        </div><!-- /konsultasi-wrap -->
    </div><!-- /main-scroll -->

    <script>
        // Ambil API key dari config.js jika tersedia, fallback ke key lokal
        function getApiKey() {
            return (window.CONFIG && window.CONFIG.OPENROUTER_API_KEY)
                ? window.CONFIG.OPENROUTER_API_KEY
                : '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';
        }

        // Model fallback chain — dicoba satu per satu jika 429/error
        const MODEL_CHAIN = [
            'openrouter/auto',
            'google/gemma-3-27b-it:free',
            'meta-llama/llama-3.3-70b-instruct:free',
            'deepseek/deepseek-r1:free',
            'qwen/qwen-2.5-72b-instruct:free',
            'mistralai/mistral-7b-instruct:free',
        ];

        let currentAnalysis = null;

        // ══════════════════════════════════════════
        // HISTORY PERSISTENCE — localStorage
        // ══════════════════════════════════════════
        const HISTORY_KEY  = 'lawyers_ai_chat_history';
        const ANALYSIS_KEY = 'lawyers_ai_last_analysis';
        let chatHistory = [];

        const WELCOME_HTML = `<div class="message-ai" id="welcome-bubble">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
                <div style="width:34px;height:34px;background:rgba(59,130,246,0.12);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                    <i class="fas fa-robot" style="color:#60A5FA;font-size:13px;"></i>
                </div>
                <div>
                    <p class="ai-title">Lawyers AI Assistant</p>
                    <p class="ai-label" style="margin-top:2px;">Powered by AI — Selalu siap 24/7</p>
                </div>
            </div>
            <p class="ai-body">Selamat datang! Saya siap membantu menganalisis kasus hukum Anda. Ceritakan kronologi kasusnya secara detail.</p>
        </div>`;

        function saveHistory() {
            try {
                localStorage.setItem(HISTORY_KEY, JSON.stringify(chatHistory.slice(-80)));
                if (currentAnalysis) localStorage.setItem(ANALYSIS_KEY, JSON.stringify(currentAnalysis));
            } catch(e) { console.warn('Save history failed:', e); }
        }

        function loadHistory() {
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = WELCOME_HTML;
            try {
                const rawAnalysis = localStorage.getItem(ANALYSIS_KEY);
                if (rawAnalysis) { currentAnalysis = JSON.parse(rawAnalysis); restorePasalBox(); }

                const raw = localStorage.getItem(HISTORY_KEY);
                if (!raw) return;
                chatHistory = JSON.parse(raw) || [];
                if (chatHistory.length === 0) return;

                chatHistory.forEach(item => {
                    const tmp = document.createElement('div');
                    tmp.innerHTML = item.html;
                    if (tmp.firstElementChild) chatBox.appendChild(tmp.firstElementChild);
                });

                // Badge riwayat
                const badge = document.createElement('div');
                badge.id = 'history-badge';
                badge.style.cssText = 'text-align:center;padding:6px 0 10px;';
                badge.innerHTML = `<span style="font-size:9px;font-weight:700;color:var(--text-4);background:var(--bg-input);border:1px solid var(--border);padding:4px 14px;border-radius:20px;text-transform:uppercase;letter-spacing:0.1em;">
                    📂 ${chatHistory.length} pesan tersimpan &nbsp;·&nbsp;
                    <button onclick="clearHistory()" style="background:none;border:none;color:#F87171;font-size:9px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:0.08em;padding:0;font-family:inherit;">Hapus Semua</button>
                </span>`;
                const welcome = document.getElementById('welcome-bubble');
                if (welcome) welcome.after(badge); else chatBox.prepend(badge);

                chatBox.scrollTop = chatBox.scrollHeight;
            } catch(e) { console.warn('Load history failed:', e); chatHistory = []; }
        }

        function restorePasalBox() {
            if (!currentAnalysis) return;
            const pasalBox = document.getElementById('pasal-box');
            if (pasalBox) pasalBox.innerHTML = buildPasalHTML(currentAnalysis);
            const pdfBtn = document.getElementById('btn-pdf');
            if (pdfBtn) {
                pdfBtn.disabled = false;
                pdfBtn.style.cssText = 'width:100%;padding:14px;background:#2563EB;border:none;border-radius:16px;font-size:10px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:0.12em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;font-family:inherit;';
                pdfBtn.innerHTML = '<i class="fas fa-file-pdf"></i> Download Somasi';
            }
        }

        function buildPasalHTML(a) {
            return `<div style="padding:16px;background:linear-gradient(135deg,#2563EB,#1d4ed8);border-radius:18px;">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                    <i class="fas fa-gavel" style="color:rgba(255,255,255,0.8);font-size:11px;"></i>
                    <p style="font-size:9px;font-weight:800;color:rgba(255,255,255,0.8);text-transform:uppercase;letter-spacing:0.1em;margin:0;">${escapeHtml(a.pasal)}</p>
                </div>
                <p style="font-size:12px;color:#fff;font-style:italic;line-height:1.65;margin-bottom:10px;">"${escapeHtml(a.isi_pasal)}"</p>
                <div style="padding-top:10px;border-top:1px solid rgba(255,255,255,0.2);">
                    <p style="font-size:9px;color:rgba(255,255,255,0.6);text-transform:uppercase;font-weight:800;letter-spacing:0.1em;margin-bottom:4px;">Kategori</p>
                    <p style="font-size:12px;color:#fff;font-weight:700;margin:0;">${escapeHtml(a.kategori || 'Hukum Umum')}</p>
                </div>
            </div>`;
        }

        async function clearHistory() {
            const ok = await laiConfirm({
                type: 'danger',
                title: 'Hapus Riwayat Chat',
                message: 'Semua percakapan akan dihapus permanen dan tidak bisa dikembalikan. Yakin ingin melanjutkan?',
                confirmText: 'Ya, Hapus Semua',
                cancelText: 'Batal'
            });
            if (!ok) return;
            localStorage.removeItem(HISTORY_KEY);
            localStorage.removeItem(ANALYSIS_KEY);
            chatHistory = [];
            currentAnalysis = null;
            document.getElementById('chat-box').innerHTML = WELCOME_HTML;
            document.getElementById('pasal-box').innerHTML = `
                <div style="padding:16px;background:rgba(59,130,246,0.05);border:1px dashed rgba(59,130,246,0.2);border-radius:16px;">
                    <p style="font-size:9px;font-weight:800;color:#60A5FA;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;">Status: Menunggu</p>
                    <p style="font-size:11px;color:var(--text-3);font-style:italic;line-height:1.6;">Analisis pasal hukum akan muncul di sini setelah Anda mengirim kasus.</p>
                </div>`;
            const pdfBtn = document.getElementById('btn-pdf');
            if (pdfBtn) {
                pdfBtn.disabled = true;
                pdfBtn.style.cssText = 'width:100%;padding:14px;background:#1E293B;border:1px solid rgba(255,255,255,0.06);border-radius:16px;font-size:10px;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:0.12em;cursor:not-allowed;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;font-family:inherit;';
                pdfBtn.innerHTML = '<i class="fas fa-lock"></i> Locked';
            }
            if (window.showLALToast) showLALToast('success', 'Riwayat Dihapus', 'Chat baru siap dimulai.');
        }

        // Append ke DOM + simpan ke history array
        function appendToChat(html, role) {
            const chatBox = document.getElementById('chat-box');
            const tmp = document.createElement('div');
            tmp.innerHTML = html;
            const el = tmp.firstElementChild || tmp;
            chatBox.appendChild(el);
            chatBox.scrollTop = chatBox.scrollHeight;
            chatHistory.push({ role, html, ts: Date.now() });
            saveHistory();
        }
        async function fetchWithFallback(prompt) {
            const apiKey = getApiKey();
            let lastError = null;
            for (const model of MODEL_CHAIN) {
                try {
                    console.log(`🤖 Mencoba model: ${model}`);
                    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`,
                            'HTTP-Referer': window.location.href,
                            'X-Title': 'Lawyers AI'
                        },
                        body: JSON.stringify({
                            model,
                            messages: [{ role: 'user', content: prompt }],
                            temperature: 0.7,
                            max_tokens: 3000
                        })
                    });
                    if (res.status === 429 || res.status === 503 || res.status === 404) {
                        console.warn(`⚠️ ${model} tidak tersedia (${res.status}), mencoba model berikutnya...`);
                        lastError = new Error(`Model ${model} tidak tersedia (${res.status})`);
                        continue;
                    }
                    if (!res.ok) {
                        const errTxt = await res.text();
                        throw new Error(`API Error ${res.status}: ${errTxt.substring(0,120)}`);
                    }
                    const data = await res.json();
                    console.log(`✅ Berhasil dengan model: ${model}`);
                    return data;
                } catch(e) {
                    lastError = e;
                    if (e.message.includes('429') || e.message.includes('503') || e.message.includes('404') || e.message.includes('rate') || e.message.includes('penuh') || e.message.includes('tersedia')) {
                        continue; // coba model berikutnya
                    }
                    throw e; // error lain langsung lempar
                }
            }
            throw new Error(`Semua model AI sedang overload. Coba lagi dalam beberapa menit.\n(${lastError?.message || 'Rate limit'})`);
        }

        async function sendMessage() {
            // Cek profil lengkap sebelum bisa chat
            if (!_profileComplete) {
                const allowed = await guardProfile();
                if (!allowed) return;
            }

            const input   = document.getElementById('user-input');
            const msg     = input.value.trim();
            if (!msg || msg.length < 5) {
                if (window.showLALToast) showLALToast('warning','Terlalu Pendek','Minimal 5 karakter.');
                else laiAlert({ type:'warning', title:'Pesan Terlalu Pendek', message:'Minimal 5 karakter ya. Ceritakan kasusnya lebih detail.' });
                return;
            }

            const chatBox = document.getElementById('chat-box');
            const btn     = document.getElementById('btn-analisis');
            const btnText = document.getElementById('btn-text');

            btn.disabled = true; input.disabled = true;
            btnText.className = 'loading-dots'; btnText.textContent = 'Menganalisis';

            const userHtml = `<div class="message-user"><p style="font-size:13px;margin:0;">${escapeHtml(msg)}</p></div>`;
            appendToChat(userHtml, 'user');
            input.value = '';

            try {
                const fullPrompt = `Kamu adalah asisten hukum AI bernama "Lawyers AI" yang ramah dan fasih Bahasa Indonesia.

ATURAN WAJIB: Selalu balas HANYA dalam format JSON valid. Jangan ada teks di luar JSON.

Jika pesan adalah salam, basa-basi, atau pertanyaan non-hukum, gunakan MODE CHAT:
{"mode":"chat","reply":"Jawaban santai dan ramah dalam Bahasa Indonesia"}

Jika pesan mengandung kasus, masalah hukum, atau pertanyaan hukum, gunakan MODE LEGAL:
{"mode":"legal","summary":"Analisis lengkap minimal 150 kata berdasarkan hukum Indonesia","pasal":"Pasal relevan misal Pasal 362 KUHP","isi_pasal":"Bunyi lengkap pasal","kategori":"Kategori hukum","saran":"Saran langkah hukum konkret"}

PENTING: Respons HANYA JSON valid. Tidak ada markdown. Tidak ada teks tambahan.

Pesan user: ${msg}`;

                const data = await fetchWithFallback(fullPrompt);
                let raw = data.choices[0].message.content;
                let jsonStr = raw.trim().replace(/```json\s*/g,'').replace(/```\s*/g,'');
                const js = jsonStr.indexOf('{'), je = jsonStr.lastIndexOf('}') + 1;
                if (js === -1 || je === 0) throw new Error('Format respons AI tidak valid');
                const parsed = JSON.parse(jsonStr.substring(js, je));

                if (parsed.mode === 'chat') {
                    appendToChat(`
                        <div class="message-ai">
                            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                                <div style="width:28px;height:28px;background:rgba(59,130,246,0.12);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                    <i class="fas fa-robot" style="color:#60A5FA;font-size:11px;"></i>
                                </div>
                                <p style="font-size:11px;font-weight:900;color:var(--text-1);font-style:italic;margin:0;">Lawyers AI</p>
                            </div>
                            <p class="ai-body">${escapeHtml(parsed.reply)}</p>
                        </div>`, 'ai');
                } else {
                    if (!parsed.summary || !parsed.pasal) throw new Error('Data analisis tidak lengkap');
                    currentAnalysis = parsed;
                    saveHistory(); // simpan analysis terbaru

                    const legalHtml = `
                        <div class="message-ai">
                            <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
                                <div style="width:28px;height:28px;background:rgba(59,130,246,0.12);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                    <i class="fas fa-balance-scale" style="color:#60A5FA;font-size:11px;"></i>
                                </div>
                                <p style="font-size:11px;font-weight:900;color:var(--text-1);font-style:italic;margin:0;">Analisis Hukum</p>
                            </div>
                            <p class="ai-body" style="margin-bottom:${parsed.saran?'12px':'0'};">${escapeHtml(parsed.summary)}</p>
                            ${parsed.saran ? `
                                <div style="padding-top:12px;border-top:1px solid var(--border);">

        function generatePDF() {
            if (!currentAnalysis) {
                if (window.showLALToast) showLALToast('warning','Belum Ada Analisis','Kirim kasus terlebih dahulu.');

                return;
            }
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ unit: 'mm', format: 'a4' });
                const pw  = doc.internal.pageSize.getWidth();   // 210
                const ph  = doc.internal.pageSize.getHeight();  // 297
                const ml  = 25, mr = 25, mt = 20;
                const cw  = pw - ml - mr; // 160mm
                let y     = mt;

                const tanggal = new Date().toLocaleDateString('id-ID', {
                    day: 'numeric', month: 'long', year: 'numeric'
                });
                const nomorSurat = `${String(Math.floor(Math.random()*900)+100)}/SOMASI/LAI/${new Date().getFullYear()}`;

                // ── Helpers ──
                const checkPage = (need = 10) => {
                    if (y + need > ph - 20) { doc.addPage(); y = mt; }
                };
                const writeText = (text, x, fontSize, style, color, maxWidth) => {
                    doc.setFontSize(fontSize);
                    doc.setFont('helvetica', style || 'normal');
                    doc.setTextColor(...(color || [30,30,30]));
                    if (maxWidth) {
                        const lines = doc.splitTextToSize(text, maxWidth);
                        doc.text(lines, x, y);
                        return lines.length;
                    } else {
                        doc.text(text, x, y);
                        return 1;
                    }
                };
                const hline = (x1, x2, lw = 0.3, color = [30,30,30]) => {
                    doc.setLineWidth(lw);
                    doc.setDrawColor(...color);
                    doc.line(x1, y, x2, y);
                };

                // ══════════════════════════════════════════
                // KOP SURAT
                // ══════════════════════════════════════════

                y += 5;
                writeText('Jl. Hukum Digital No. 1, Jakarta Pusat 10110  |  www.lawyers-ai.id  |  info@lawyers-ai.id', ml, 8, 'normal', [120,120,120]);

                // Garis bawah kop

                doc.setDrawColor(37,99,235);
                doc.line(ml, y, pw - mr, y);

                doc.text(`Jakarta, ${tanggal}`, col2, y); y += 6;
                doc.text(`Lampiran  : -`, ml, y); y += 6;
                doc.text(`Hal       : `, ml, y);
                doc.setFont('helvetica','bold');
                doc.text('SOMASI (TEGURAN HUKUM)', ml + 22, y);
                doc.setFont('helvetica','normal');
                y += 10;

                // ── Kepada ──
                doc.text('Kepada Yth.', ml, y); y += 6;
                doc.setFont('helvetica','bold');
                doc.text('[NAMA PIHAK YANG DISOMASI]', ml, y); y += 6;
                doc.setFont('helvetica','normal');
                doc.text('[Jabatan / Instansi]', ml, y); y += 6;
                doc.text('[Alamat Lengkap]', ml, y); y += 6;
                doc.text('di —', ml, y); y += 6;

                doc.text('Tempat', ml, y);
                doc.setFont('helvetica','normal');
                y += 10;

                // Garis pemisah tipis

                const pembukaan = `Dengan hormat,\n\nYang bertanda tangan di bawah ini, kami dari Lawyers AI, selaku kuasa hukum dan/atau pihak yang berkepentingan, dengan ini menyampaikan SOMASI (Surat Teguran Hukum) kepada Saudara/i sebagaimana tersebut di atas, berkenaan dengan hal-hal sebagai berikut:`;
                doc.setFontSize(11); doc.setFont('helvetica','normal'); doc.setTextColor(30,30,30);
                const pembukaanLines = doc.splitTextToSize(pembukaan, cw);

                // ══════════════════════════════════════════

                doc.setFontSize(11); doc.setFont('helvetica','bold'); doc.setTextColor(37,99,235);

                doc.setFont('helvetica','normal'); doc.setTextColor(30,30,30); doc.setFontSize(11);

                checkPage(summaryLines.length * 6 + 6);
                doc.text(summaryLines, ml, y);
                y += summaryLines.length * 6 + 8;

                // ══════════════════════════════════════════

                doc.setDrawColor(200, 200, 200);
                doc.setLineWidth(0.2);
                doc.roundedRect(ml, y - 3, cw, pasalLines.length * 5.5 + 6, 2, 2, 'FD');
                doc.text(pasalLines, ml + 4, y + 2);
                y += pasalLines.length * 5.5 + 10;

                // Kategori
                doc.setFont('helvetica','normal'); doc.setTextColor(30,30,30); doc.setFontSize(11);
                doc.text(`Kategori Hukum  :  `, ml, y);

                doc.setFontSize(11); doc.setFont('helvetica','bold'); doc.setTextColor(37,99,235);

                // Deadline

                doc.setFillColor(254, 242, 242);

                doc.roundedRect(ml, y - 3, cw, 16, 2, 2, 'FD');

                // ══════════════════════════════════════════
                // BAGIAN IV — PENUTUP
                // ══════════════════════════════════════════
                checkPage(40);
                doc.setFontSize(11); doc.setFont('helvetica','bold'); doc.setTextColor(37,99,235);
                doc.text('IV.  PENUTUP', ml, y); y += 7;

                doc.setFont('helvetica','normal'); doc.setTextColor(30,30,30); doc.setFontSize(11);

                const penutupLines = doc.splitTextToSize(penutup, cw);
                checkPage(penutupLines.length * 6 + 6);
                doc.text(penutupLines, ml, y);
                y += penutupLines.length * 6 + 12;

                // ══════════════════════════════════════════
                // TANDA TANGAN
                // ══════════════════════════════════════════
                checkPage(50);
                // 2 blok TTD — Pembuat & Penerima
                const ttdX1 = ml;

                y += 30; // ruang TTD

                doc.setLineWidth(0.3); doc.setDrawColor(30,30,30);
                doc.line(ttdX1, y, ttdX1 + 70, y);
                doc.line(ttdX2, y, ttdX2 + 70, y);
                y += 5;

                doc.setFont('helvetica','bold'); doc.setFontSize(10);
                doc.text('[NAMA PEMBUAT SOMASI]', ttdX1, y);
                doc.text('[NAMA PENERIMA]', ttdX2, y); y += 5;
                doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(80,80,80);
                doc.text('Penggugat / Pelapor', ttdX1, y);
                doc.text('Tergugat / Terlapor', ttdX2, y);
                y += 14;

                // ── Materai placeholder ──
                doc.setDrawColor(100,100,100); doc.setLineWidth(0.3);
                doc.rect(ttdX1 + 15, y - 38, 28, 20);
                doc.setFontSize(7); doc.setTextColor(130,130,130); doc.setFont('helvetica','italic');
                doc.text('Materai\nRp 10.000', ttdX1 + 22, y - 31);

                // ══════════════════════════════════════════
                // FOOTER SEMUA HALAMAN
                // ══════════════════════════════════════════
                const pc = doc.internal.getNumberOfPages();
                for (let i = 1; i <= pc; i++) {
                    doc.setPage(i);
                    // Garis footer
                    doc.setLineWidth(0.3); doc.setDrawColor(37,99,235);
                    doc.line(ml, ph - 14, pw - mr, ph - 14);
                    doc.setFontSize(7.5); doc.setFont('helvetica','italic'); doc.setTextColor(120,120,120);

            } catch(e) {

                else laiAlert({ type:'danger', title:'Gagal Membuat PDF', message:`Terjadi kesalahan: ${e.message}` });
            }
        }

        // ── PROFILE GUARD ──
        let _currentUser = null;
        let _profileComplete = false;

        const REQUIRED_FIELDS = ['full_name', 'wa_number'];
        const FIELD_LABELS = { full_name: 'Nama Lengkap', wa_number: 'Nomor WhatsApp' };

        async function checkProfileComplete() {
            try {
                const { data: { session } } = await window.supabase.auth.getSession();
                if (!session) { window.location.href = 'login.html'; return false; }
                _currentUser = session.user;

                const { data: profile } = await window.supabase
                    .from('profiles').select('full_name,wa_number')
                    .eq('id', _currentUser.id).maybeSingle();

                const missing = REQUIRED_FIELDS.filter(f => !profile?.[f]?.trim());
                if (missing.length > 0) {
                    _profileComplete = false;
                    return missing;
                }
                _profileComplete = true;
                return [];
            } catch(e) {
                // Jika supabase error (misal offline), biarkan tetap bisa chat
                _profileComplete = true;
                return [];
            }
        }

        async function guardProfile() {
            const missing = await checkProfileComplete();
            if (!missing || missing.length === 0) return true;

            const labels = missing.map(f => `<strong>${FIELD_LABELS[f]||f}</strong>`).join(' dan ');
            const ok = await laiConfirm({
                type: 'warning',
                title: 'Lengkapi Profil Dulu',
                message: `Sebelum konsultasi, lengkapi ${labels} di halaman profil kamu terlebih dahulu.<br><br>Ini diperlukan agar advokat bisa menghubungi kamu jika diperlukan.`,
                confirmText: 'Ke Halaman Profil',
                cancelText: 'Nanti Saja'
            });
            if (ok) window.location.href = 'profile.html';
            return false;
        }

        window.addEventListener('DOMContentLoaded', async () => {
            // Load history tersimpan
            loadHistory();

            // Cek profil di background
            const missing = await checkProfileComplete();
            if (missing && missing.length > 0) {
                // Tampilkan banner peringatan di atas chat
                const chatBox = document.getElementById('chat-box');
                const banner = document.createElement('div');
                banner.id = 'profile-incomplete-banner';
                banner.innerHTML = `
                    <div style="display:flex;align-items:center;gap:12px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:14px;padding:12px 16px;margin-bottom:12px;">
                        <i class="fas fa-circle-exclamation" style="color:#FBBF24;font-size:16px;flex-shrink:0;"></i>
                        <div style="flex:1;min-width:0;">
                            <p style="font-size:12px;font-weight:700;color:#FDE68A;margin:0 0 2px;">Profil Belum Lengkap</p>
                            <p style="font-size:11px;color:#92400E;color:#D97706;margin:0;">${missing.map(f=>FIELD_LABELS[f]||f).join(' & ')} belum diisi. <a href="profile.html" style="color:#FBBF24;font-weight:700;text-decoration:underline;">Lengkapi sekarang →</a></p>
                        </div>
                        <button onclick="this.parentElement.parentElement.remove()" style="background:none;border:none;color:#92400E;cursor:pointer;font-size:14px;flex-shrink:0;padding:0;"><i class="fas fa-xmark"></i></button>
                    </div>`;
                chatBox.insertBefore(banner, chatBox.firstChild);
            }

            const params = new URLSearchParams(window.location.search);
            const cat = params.get('cat');
            if (cat && CATEGORY_MAP[cat]) {
                document.getElementById('user-input').value = CATEGORY_MAP[cat];
                setTimeout(() => sendMessage(), 600);
            }
        });
    </script>
</body>
</html>
