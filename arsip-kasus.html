<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip Kasus — Lawyers AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="shared-modal.js" onerror="window.laiConfirm=({message=''}={})=>new Promise(r=>r(confirm(message)));window.laiAlert=({message=''}={})=>new Promise(r=>{alert(message);r();});"></script>
    <script src="config.js"></script>
    <script src="push-init.js"></script>
    <link rel="stylesheet" href="shared.css">
    <script src="shared-sidebar.js" defer></script>
    <style>
        body { display: flex; min-height: 100vh; }
        .main-scroll { flex: 1; overflow-y: auto; min-width: 0; }

        /* ── CASE CARD ── */
        .case-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px 22px;
            transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
        }
        .case-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--shadow);
        }
        body.light .case-card { background: #FFFFFF; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

        /* Highlight card yang sedang ditangani */
        .case-card.handling {
            border-color: rgba(245,158,11,0.35);
            background: rgba(245,158,11,0.03);
        }
        .case-card.handling:hover { border-color: rgba(245,158,11,0.55); }

        /* ── STATUS BADGE ── */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
        }
        .s-menunggu       { background:rgba(100,116,139,0.12); color:#94A3B8; border:1px solid rgba(100,116,139,0.2); }
        .s-sedang         { background:rgba(245,158,11,0.12);  color:#FBBF24; border:1px solid rgba(245,158,11,0.25); animation: pulse-badge 2s ease-in-out infinite; }
        .s-selesai        { background:rgba(16,185,129,0.12);  color:#34D399; border:1px solid rgba(16,185,129,0.25); }
        .s-ditutup        { background:rgba(239,68,68,0.1);    color:#F87171; border:1px solid rgba(239,68,68,0.2); }
        @keyframes pulse-badge { 0%,100%{opacity:1} 50%{opacity:0.55} }

        /* ── HANDLING BANNER ── */
        .handling-banner {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(245,158,11,0.07);
            border: 1px solid rgba(245,158,11,0.2);
            border-radius: 12px;
            padding: 10px 14px;
            margin-top: 12px;
        }

        /* ── DETAIL MODAL ── */
        .modal-overlay { position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:16px; }
        .modal-bg { position:absolute;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px); }
        .modal-box { position:relative;z-index:1;background:var(--bg-sidebar);border:1px solid var(--border);border-radius:24px;width:100%;max-width:640px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden; }
        body.light .modal-box { background:#FFFFFF; }
        .modal-head { padding:20px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between; }
        .modal-body { overflow-y:auto;padding:20px 22px;flex:1; }
        .detail-block { background:var(--bg-input);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px; }
        body.light .detail-block { background:#F8FAFC; }

        /* ── FILTER TABS ── */
        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-tab {
            padding: 7px 16px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text-3);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .filter-tab.active, .filter-tab:hover {
            background: rgba(59,130,246,0.12);
            border-color: rgba(59,130,246,0.3);
            color: #60A5FA;
        }
        .filter-tab.active { font-weight: 800; }
    </style>
</head>
<body>
    <div class="main-scroll">
        <div style="max-width:900px;margin:0 auto;padding:20px 20px 48px;padding-top:72px;" class="ak-fix">
        <style>@media(min-width:1024px){.ak-fix{padding-top:36px!important}}</style>

            <!-- Header -->
            <header style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;" class="fade-up">
                <div>
                    <p style="font-size:10px;font-weight:700;color:var(--text-4);text-transform:uppercase;letter-spacing:0.14em;margin-bottom:4px;">Riwayat</p>
                    <h2 style="font-size:26px;font-weight:900;color:var(--text-1);margin:0;font-style:italic;">Arsip <span style="color:#60A5FA;">Kasus</span></h2>
                    <p style="font-size:10px;color:var(--text-3);font-weight:600;margin-top:6px;text-transform:uppercase;letter-spacing:0.12em;">Riwayat Konsultasi & Analisis Hukum</p>
                </div>
                <button onclick="window.toggleTheme?.()" class="theme-toggle" style="flex-shrink:0;margin-top:4px;"><div class="knob">🌙</div></button>
            </header>

            <!-- Filter Tabs -->
            <div class="filter-tabs fade-up" style="animation-delay:0.05s;">
                <button class="filter-tab active" onclick="setFilter('semua', this)">Semua</button>
                <button class="filter-tab" onclick="setFilter('ai', this)">
                    <i class="fas fa-robot" style="margin-right:5px;font-size:10px;"></i>Konsultasi AI
                </button>
                <button class="filter-tab" onclick="setFilter('lawyer', this)">
                    <i class="fas fa-user-tie" style="margin-right:5px;font-size:10px;"></i>Advokat
                </button>
                <button class="filter-tab" onclick="setFilter('sedang_ditangani', this)" id="tab-handling">
                    <i class="fas fa-scale-balanced" style="margin-right:5px;font-size:10px;"></i>Sedang Ditangani
                </button>
            </div>

            <!-- Cases Container -->
            <div id="cases-container" style="display:flex;flex-direction:column;gap:12px;"></div>

            <!-- Loading -->
            <div id="loading-state" style="text-align:center;padding:40px 20px;">
                <div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:#3B82F6;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div>
                <p style="font-size:12px;color:var(--text-3);">Memuat arsip kasus...</p>
            </div>

            <!-- Empty -->
            <div id="empty-state" style="display:none;text-align:center;padding:60px 20px;" class="fade-up">
                <div style="width:64px;height:64px;background:var(--bg-input);border:1px solid var(--border);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;">
                    <i class="fas fa-folder-open" style="font-size:24px;color:var(--text-3);"></i>
                </div>
                <h3 style="font-size:16px;font-weight:800;color:var(--text-1);margin:0 0 8px;">Belum Ada Riwayat</h3>
                <p style="font-size:13px;color:var(--text-3);margin:0 0 20px;">Mulai konsultasi untuk melihat arsip kasus kamu di sini</p>
                <a href="konsultasi.html" class="btn-primary">Mulai Konsultasi AI</a>
            </div>

        </div>
    </div>

    <script>
        // ── STATE ──
        let currentUser  = null;
        let allCases     = [];
        let activeFilter = 'semua';

        // ── STATUS CONFIG ──
        const STATUS_CFG = {
            menunggu:         { label: 'Menunggu',         icon: 'fa-clock',          cls: 's-menunggu' },
            sedang_ditangani: { label: 'Sedang Ditangani', icon: 'fa-scale-balanced', cls: 's-sedang'   },
            selesai:          { label: 'Selesai',          icon: 'fa-check-circle',   cls: 's-selesai'  },
            ditutup:          { label: 'Ditutup',          icon: 'fa-lock',           cls: 's-ditutup'  },
        };

        function renderStatusBadge(status) {
            const c = STATUS_CFG[status] || STATUS_CFG.menunggu;
            return `<span class="status-badge ${c.cls}">
                <span class="status-dot"></span>
                <i class="fas ${c.icon}" style="font-size:8px;"></i>
                ${c.label}
            </span>`;
        }

        // ── FILTER ──
        function setFilter(filter, btn) {
            activeFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            renderCases();
        }

        // ── SESSION ──
        async function checkSession() {
            const { data: { session } } = await window.supabase.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }
            currentUser = session.user;
            loadCaseHistory();
            subscribeRealtimeStatus();
        }

        // ── LOAD DATA ──
        async function loadCaseHistory() {
            try {
                allCases = [];

                // 1. Konsultasi AI
                // Kolom: query, response/hasil_analisis, category/topik_kasus, pasal_terkait
                let { data: aiData, error: aiError } = await window.supabase
                    .from('riwayat_konsultasi')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false });

                if (aiError) console.warn('riwayat error:', aiError.message);

                // FALLBACK: jika kosong, ambil semua (RLS akan filter otomatis)
                if (!aiError && (!aiData || aiData.length === 0)) {
                    console.log('Filter user_id kosong, mencoba tanpa filter...');
                    const fallback = await window.supabase
                        .from('riwayat_konsultasi')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .limit(100);
                    if (!fallback.error) aiData = fallback.data || [];
                    console.log('Fallback result:', aiData.length, 'rows');
                }

                if (aiData && aiData.length > 0) {
                    aiData.forEach(c => {
                        const rawTitle   = c.query || c.topik_kasus || c.kronologi || 'Konsultasi AI';
                        const rawContent = c.response || c.hasil_analisis || '';
                        const rawCat     = c.category || c.topik_kasus || 'Umum';
                        allCases.push({
                            type:               'ai',
                            id:                 c.id,
                            title:              rawTitle.substring(0, 60) + (rawTitle.length > 60 ? '...' : ''),
                            category:           rawCat,
                            date:               new Date(c.created_at),
                            content:            rawContent,
                            pasal:              c.pasal_terkait || '',
                            handling_status:    c.handling_status || 'menunggu',
                            assigned_lawyer_id: c.assigned_lawyer_id || null,
                            lawyer_name:        c.lawyer_name || null,
                            raw:                c,
                        });
                    });
                }

                // 2. Pesan advokat dari messages
                // Kolom asli: sender_id, receiver_id, lawyer_id, message_text,
                //             conversation_id, topic, inserted_at, created_at
                const { data: msgs, error: msgError } = await window.supabase
                    .from('messages')
                    .select(`
                        id, conversation_id, message_text, topic,
                        inserted_at, created_at,
                        lawyer_id, receiver_id,
                        lawyer_profile:profiles!receiver_id ( full_name, specialization )
                    `)
                    .eq('sender_id', currentUser.id)
                    .not('lawyer_id', 'is', null)
                    .order('created_at', { ascending: false });

                if (!msgError && msgs && msgs.length > 0) {
                    const convMap = new Map();
                    msgs.forEach(m => {
                        const cid = m.conversation_id || m.id;
                        if (!convMap.has(cid)) {
                            // Cari nama advokat dari profiles via receiver_id
                            const lawyerName = m.lawyer_profile?.full_name
                                || m.lawyer_profile?.nama_lengkap
                                || 'Advokat';
                            const lawyerSpec = m.lawyer_profile?.specialization
                                || m.lawyer_profile?.spesialisasi
                                || 'Hukum Umum';
                            const judul = m.topic
                                || (m.message_text ? m.message_text.substring(0, 60) : null)
                                || 'Konsultasi Advokat';

                            convMap.set(cid, {
                                type:            'lawyer',
                                id:              cid,
                                title:           judul,
                                date:            new Date(m.created_at || m.inserted_at),
                                lawyer:          lawyerName,
                                specialization:  lawyerSpec,
                                lawyer_id:       m.lawyer_id,
                                handling_status: 'menunggu',
                            });
                        }
                    });
                    convMap.forEach(c => allCases.push(c));
                } else if (msgError) {
                    console.warn('Messages query error:', msgError.message);
                    // Fallback: coba tanpa join profiles
                    const { data: msgs2 } = await window.supabase
                        .from('messages')
                        .select('id, conversation_id, message_text, topic, inserted_at, created_at, lawyer_id, receiver_id')
                        .eq('sender_id', currentUser.id)
                        .not('lawyer_id', 'is', null)
                        .order('created_at', { ascending: false });

                    if (msgs2 && msgs2.length > 0) {
                        const convMap = new Map();
                        msgs2.forEach(m => {
                            const cid = m.conversation_id || m.id;
                            if (!convMap.has(cid)) {
                                convMap.set(cid, {
                                    type:            'lawyer',
                                    id:              cid,
                                    title:           m.topic || (m.message_text ? m.message_text.substring(0, 60) : 'Konsultasi Advokat'),
                                    date:            new Date(m.created_at || m.inserted_at),
                                    lawyer:          'Advokat',
                                    specialization:  'Hukum Umum',
                                    lawyer_id:       m.lawyer_id,
                                    handling_status: 'menunggu',
                                });
                            }
                        });
                        convMap.forEach(c => allCases.push(c));
                    }
                }

                // Sort terbaru dulu
                allCases.sort((a, b) => b.date - a.date);

                document.getElementById('loading-state').style.display = 'none';
                renderCases();

            } catch (err) {
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('cases-container').innerHTML = `
                    <div style="text-align:center;padding:60px 20px;">
                        <i class="fas fa-exclamation-circle" style="font-size:36px;color:#F87171;margin-bottom:12px;display:block;"></i>
                        <p style="font-size:13px;font-weight:700;color:var(--text-1);margin:0 0 8px;">Gagal Memuat Data</p>
                        <p style="font-size:11px;color:var(--text-3);margin:0 0 16px;">${escHtml(err.message)}</p>
                        <button onclick="location.reload()" class="btn-primary">Coba Lagi</button>
                    </div>`;
            }
        }

        // ── RENDER LIST ──
        function renderCases() {
            const container  = document.getElementById('cases-container');
            const emptyState = document.getElementById('empty-state');

            // Filter
            let filtered = allCases;
            if (activeFilter === 'ai')               filtered = allCases.filter(c => c.type === 'ai');
            else if (activeFilter === 'lawyer')       filtered = allCases.filter(c => c.type === 'lawyer');
            else if (activeFilter === 'sedang_ditangani') filtered = allCases.filter(c => c.handling_status === 'sedang_ditangani');

            if (filtered.length === 0) {
                container.innerHTML  = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            container.innerHTML = '';

            filtered.forEach((c, i) => {
                const dateStr = c.date.toLocaleDateString('id-ID', {
                    year: 'numeric', month: 'long', day: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });
                const el = document.createElement('div');
                el.className  = `case-card fade-up${c.handling_status === 'sedang_ditangani' ? ' handling' : ''}`;
                el.style.animationDelay = `${i * 0.05}s`;
                el.dataset.caseId = c.id;
                el.dataset.caseType = c.type;

                if (c.type === 'ai') {
                    el.innerHTML = buildAICard(c, dateStr);
                } else {
                    el.innerHTML = buildLawyerCard(c, dateStr);
                }

                container.appendChild(el);
            });
        }

        // ── TEMPLATE: AI CARD ──
        function buildAICard(c, dateStr) {
            const isHandling = c.handling_status === 'sedang_ditangani';
            return `
                <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px;">
                    <div style="display:flex;align-items:center;gap:12px;">
                        <div style="width:38px;height:38px;background:rgba(59,130,246,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                            <i class="fas fa-robot" style="color:#60A5FA;font-size:14px;"></i>
                        </div>
                        <div>
                            <p style="font-size:12px;font-weight:800;color:var(--text-1);margin:0 0 4px;">${escHtml(c.title)}</p>
                            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                                <span style="font-size:9px;font-weight:700;background:rgba(59,130,246,0.1);color:#60A5FA;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:0.07em;">${escHtml(c.category)}</span>
                                ${renderStatusBadge(c.handling_status)}
                            </div>
                        </div>
                    </div>
                    <span style="font-size:10px;color:var(--text-3);white-space:nowrap;">${dateStr}</span>
                </div>

                <p style="font-size:12px;color:var(--text-3);margin:0 0 12px;line-height:1.6;
                    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">
                    ${escHtml((c.content || '').substring(0, 200))}
                </p>

                ${isHandling && c.lawyer_name ? `
                <div class="handling-banner">
                    <div style="width:30px;height:30px;background:rgba(245,158,11,0.15);border-radius:8px;
                        display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                        <i class="fas fa-user-tie" style="color:#FBBF24;font-size:11px;"></i>
                    </div>
                    <div style="flex:1;min-width:0;">
                        <p style="font-size:9px;font-weight:800;color:#FBBF24;text-transform:uppercase;letter-spacing:0.1em;margin:0 0 2px;">Sedang Ditangani Oleh</p>
                        <p style="font-size:12px;font-weight:700;color:var(--text-1);margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(c.lawyer_name)}</p>
                    </div>
                    <button onclick="location.href='chat-advokat.html?lawyer=${escHtml(c.assigned_lawyer_id)}'"
                        style="padding:7px 12px;background:#2563EB;border:none;border-radius:10px;
                        font-size:10px;font-weight:800;color:#fff;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0;">
                        <i class="fas fa-comments"></i> Chat
                    </button>
                </div>` : ''}

                <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
                    <button onclick="viewAICase('${c.id}')" style="font-size:11px;font-weight:700;color:#60A5FA;background:none;border:none;cursor:pointer;padding:0;">
                        Lihat Detail →
                    </button>
                    <button onclick="exportCasePDF('${c.id}')" style="font-size:11px;font-weight:700;color:#34D399;background:none;border:none;cursor:pointer;padding:0;">
                        <i class="fas fa-file-pdf" style="margin-right:4px;"></i>Export PDF
                    </button>
                    <button onclick="deleteCase('${c.id}','ai')" style="font-size:11px;font-weight:700;color:#F87171;background:none;border:none;cursor:pointer;padding:0;margin-left:auto;">
                        <i class="fas fa-trash" style="margin-right:4px;"></i>Hapus
                    </button>
                </div>`;
        }

        // ── TEMPLATE: LAWYER CARD ──
        function buildLawyerCard(c, dateStr) {
            return `
                <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px;">
                    <div style="display:flex;align-items:center;gap:12px;">
                        <div style="width:38px;height:38px;background:rgba(16,185,129,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                            <i class="fas fa-user-tie" style="color:#34D399;font-size:14px;"></i>
                        </div>
                        <div>
                            <p style="font-size:12px;font-weight:800;color:var(--text-1);margin:0 0 4px;">${escHtml(c.title)}</p>
                            <span style="font-size:10px;color:var(--text-3);">dengan ${escHtml(c.lawyer)} · ${escHtml(c.specialization)}</span>
                        </div>
                    </div>
                    <span style="font-size:10px;color:var(--text-3);white-space:nowrap;">${dateStr}</span>
                </div>
                <p style="font-size:12px;color:var(--text-3);margin:0 0 12px;line-height:1.6;">
                    Konsultasi dengan advokat profesional berlisensi NIA.
                </p>
                <div style="display:flex;gap:12px;align-items:center;padding-top:12px;border-top:1px solid var(--border);">
                    <button onclick="location.href='chat-advokat.html?conversation=${escHtml(c.id)}'"
                        style="font-size:11px;font-weight:700;color:#34D399;background:none;border:none;cursor:pointer;padding:0;">
                        Lihat Percakapan →
                    </button>
                </div>`;
        }

        // ── REALTIME: status kasus update otomatis ──
        function subscribeRealtimeStatus() {
            if (!window.supabase || !currentUser) return;
            window.supabase
                .channel('arsip-realtime-' + currentUser.id)
                .on('postgres_changes', {
                    event:  'UPDATE',
                    schema: 'public',
                    table:  'riwayat_konsultasi',
                    filter: `user_id=eq.${currentUser.id}`,
                }, (payload) => {
                    const updated = payload.new;
                    const idx = allCases.findIndex(c => c.id === updated.id);
                    if (idx !== -1) {
                        allCases[idx].handling_status    = updated.handling_status    || 'menunggu';
                        allCases[idx].lawyer_name        = updated.lawyer_name        || null;
                        allCases[idx].assigned_lawyer_id = updated.assigned_lawyer_id || null;
                    }
                    renderCases();
                    const cfg = STATUS_CFG[updated.handling_status];
                    if (cfg && window.showLALToast) {
                        showLALToast('info', 'Status Kasus Diperbarui', `Kasus Anda kini: ${cfg.label}`);
                    }
                })
                // Juga listen pesan baru dari advokat
                .on('postgres_changes', {
                    event:  'INSERT',
                    schema: 'public',
                    table:  'messages',
                    filter: `receiver_id=eq.${currentUser.id}`,
                }, () => {
                    // Reload untuk tampilkan pesan baru di tab Advokat
                    loadCaseHistory();
                })
                .subscribe();
        }

        // ── VIEW DETAIL AI ──
        function viewAICase(caseId) {
            window.supabase
                .from('riwayat_konsultasi')
                .select('*')
                .eq('id', caseId)
                .single()
                .then(({ data, error }) => {
                    if (error || !data) { showLALToast('error', 'Data tidak ditemukan'); return; }
                    const modal = document.createElement('div');
                    modal.className = 'modal-overlay';
                    modal.innerHTML = `
                        <div class="modal-bg" onclick="this.closest('.modal-overlay').remove()"></div>
                        <div class="modal-box">
                            <div class="modal-head">
                                <div>
                                    <h3 style="font-size:16px;font-weight:900;color:var(--text-1);margin:0;font-style:italic;">
                                        Detail <span style="color:#60A5FA;">Konsultasi AI</span>
                                    </h3>
                                    <p style="font-size:10px;color:var(--text-3);margin:4px 0 0;">
                                        ${new Date(data.created_at).toLocaleDateString('id-ID',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'})}
                                        &nbsp;·&nbsp; ${renderStatusBadge(data.handling_status || 'menunggu')}
                                    </p>
                                </div>
                                <button onclick="this.closest('.modal-overlay').remove()"
                                    style="width:32px;height:32px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;
                                    display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);font-size:12px;">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                            <div class="modal-body">
                                ${data.handling_status === 'sedang_ditangani' && data.lawyer_name ? `
                                <div class="handling-banner" style="margin-bottom:14px;">
                                    <div style="width:30px;height:30px;background:rgba(245,158,11,0.15);border-radius:8px;
                                        display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                        <i class="fas fa-user-tie" style="color:#FBBF24;font-size:11px;"></i>
                                    </div>
                                    <div style="flex:1;">
                                        <p style="font-size:9px;font-weight:800;color:#FBBF24;text-transform:uppercase;letter-spacing:0.1em;margin:0 0 2px;">Sedang Ditangani Oleh</p>
                                        <p style="font-size:13px;font-weight:700;color:var(--text-1);margin:0;">${escHtml(data.lawyer_name)}</p>
                                    </div>
                                </div>` : ''}
                                <div class="detail-block">
                                    <p style="font-size:9px;font-weight:700;color:#60A5FA;text-transform:uppercase;letter-spacing:0.1em;margin:0 0 8px;">Pertanyaan Anda</p>
                                    <p style="font-size:13px;color:var(--text-1);margin:0;line-height:1.7;">${escHtml(data.query || data.topik_kasus || data.kronologi || '-')}</p>
                                </div>
                                ${data.kronologi && data.query ? `
                                <div class="detail-block">
                                    <p style="font-size:9px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:0.1em;margin:0 0 8px;">Kronologi</p>
                                    <p style="font-size:13px;color:var(--text-1);margin:0;line-height:1.7;white-space:pre-wrap;">${escHtml(data.kronologi)}</p>
                                </div>` : ''}
                                <div class="detail-block">
                                    <p style="font-size:9px;font-weight:700;color:#34D399;text-transform:uppercase;letter-spacing:0.1em;margin:0 0 8px;">Analisis AI</p>
                                    <p style="font-size:13px;color:var(--text-1);margin:0;line-height:1.7;white-space:pre-wrap;">${escHtml(data.response || data.hasil_analisis || '-')}</p>
                                </div>
                                ${data.pasal_terkait ? `
                                <div class="detail-block">
                                    <p style="font-size:9px;font-weight:700;color:#FBBF24;text-transform:uppercase;letter-spacing:0.1em;margin:0 0 8px;">Pasal Terkait</p>
                                    <p style="font-size:13px;color:var(--text-1);margin:0;line-height:1.7;">${escHtml(data.pasal_terkait)}</p>
                                </div>` : ''}
                                ${data.category || data.topik_kasus ? `<span style="font-size:9px;font-weight:700;background:rgba(59,130,246,0.1);color:#60A5FA;padding:4px 12px;border-radius:20px;text-transform:uppercase;">${escHtml(data.category || data.topik_kasus)}</span>` : ''}
                            </div>
                        </div>`;
                    document.body.appendChild(modal);
                });
        }

        // ── DELETE ──
        async function deleteCase(caseId, type) {
            const confirmed = await laiConfirm({
                type: 'danger',
                title: 'Hapus Kasus?',
                message: 'Riwayat konsultasi ini akan dihapus permanen dan tidak bisa dikembalikan.',
                confirmText: 'Ya, Hapus',
                cancelText: 'Batal'
            });
            if (!confirmed) return;
            try {
                const { error } = await window.supabase
                    .from('riwayat_konsultasi')
                    .delete()
                    .eq('id', caseId)
                    .eq('user_id', currentUser.id);
                if (error) throw error;
                allCases = allCases.filter(c => c.id !== caseId);
                renderCases();
                showLALToast('success', 'Kasus Dihapus', 'Riwayat konsultasi berhasil dihapus.');
            } catch (err) {
                showLALToast('error', 'Gagal Hapus', err.message);
            }
        }

        // ── EXPORT PDF ──
        async function exportCasePDF(caseId) {
            try {
                const { data, error } = await window.supabase
                    .from('riwayat_konsultasi')
                    .select('*')
                    .eq('id', caseId)
                    .single();
                if (error || !data) { showLALToast('error', 'Data tidak ditemukan'); return; }

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
                const W = 210, M = 20, TW = W - M * 2;
                let y = 20;

                doc.setFillColor(37, 99, 235);
                doc.rect(0, 0, W, 36, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(18); doc.setFont('helvetica', 'bolditalic');
                doc.text('LawyersAI', M, 16);
                doc.setFontSize(9); doc.setFont('helvetica', 'normal');
                doc.text('Dokumen Konsultasi Hukum', M, 24);
                doc.setFontSize(8);
                const dateStr = new Date(data.created_at).toLocaleDateString('id-ID', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' });
                doc.text(dateStr, W - M, 24, { align: 'right' });
                y = 50;

                if (data.category) {
                    doc.setFillColor(239, 246, 255);
                    doc.setDrawColor(191, 219, 254);
                    doc.roundedRect(M, y - 5, 50, 10, 3, 3, 'FD');
                    doc.setTextColor(37, 99, 235);
                    doc.setFontSize(8); doc.setFont('helvetica', 'bold');
                    doc.text(data.category.toUpperCase(), M + 4, y + 2);
                    y += 14;
                }

                doc.setTextColor(15, 23, 42);
                doc.setFontSize(9); doc.setFont('helvetica', 'bold');
                doc.text('PERTANYAAN ANDA', M, y);
                y += 6;
                doc.setDrawColor(59, 130, 246); doc.setLineWidth(0.5);
                doc.line(M, y, M + TW, y);
                y += 6;
                doc.setFontSize(11); doc.setFont('helvetica', 'normal');
                doc.setTextColor(30, 41, 59);
                const qLines = doc.splitTextToSize(data.query || data.topik_kasus || data.kronologi || '-', TW);
                doc.text(qLines, M, y);
                y += qLines.length * 6 + 10;

                doc.setTextColor(15, 23, 42);
                doc.setFontSize(9); doc.setFont('helvetica', 'bold');
                doc.text('ANALISIS AI LAWYERS AI', M, y);
                y += 6;
                doc.setDrawColor(16, 185, 129);
                doc.line(M, y, M + TW, y);
                y += 6;
                doc.setFontSize(10); doc.setFont('helvetica', 'normal');
                doc.setTextColor(30, 41, 59);
                const aLines = doc.splitTextToSize(data.response || data.hasil_analisis || '-', TW);
                aLines.forEach(line => {
                    if (y > 270) { doc.addPage(); y = 20; }
                    doc.text(line, M, y);
                    y += 6;
                });

                const totalPages = doc.internal.getNumberOfPages();
                for (let i = 1; i <= totalPages; i++) {
                    doc.setPage(i);
                    doc.setFontSize(7); doc.setTextColor(148, 163, 184);
                    doc.text('Dokumen ini dibuat otomatis oleh LawyersAI. Bukan merupakan nasihat hukum resmi.', M, 290);
                    doc.text(`Halaman ${i} / ${totalPages}`, W - M, 290, { align: 'right' });
                }

                doc.save(`LawyersAI_${new Date(data.created_at).toISOString().slice(0,10)}.pdf`);
                showLALToast('success', 'PDF Diunduh', 'Berhasil diexport.');
            } catch (err) {
                showLALToast('error', 'Gagal Export', err.message);
            }
        }

        // ── UTIL ──
        function escHtml(t) {
            if (!t) return '';
            const d = document.createElement('div');
            d.textContent = String(t);
            return d.innerHTML;
        }

        // ── SPINNER CSS ──
        const spinStyle = document.createElement('style');
        spinStyle.textContent = `@keyframes spin { to { transform: rotate(360deg); } }`;
        document.head.appendChild(spinStyle);

        // ── BOOT ──
        checkSession();
    </script>
</body>
</html>
